<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#002712">
<title>Processor Tycoon</title>
<style>
/* ═══════════ DESIGN SYSTEM (из твоего макета) ═══════════ */
:root{
  --bg:#002712;
  --panel:#004C22;
  --panel2:#013d1c;
  --card:#004C22;
  --card-hi:#01632d;
  --input:#001a0c;
  --g1:#00FF73;
  --g2:#00823A;
  --name:#004720;
  --text:#E8F7EE;
  --text2:#b8e6c8;
  --muted:#6fba8f;
  --border:rgba(0,255,115,.18);
  --st:env(safe-area-inset-top, 0px);
  --sb:env(safe-area-inset-bottom, 0px);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%; width:100%;
  background:var(--bg); color:var(--text);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  overflow:hidden; overscroll-behavior:none;
}
/* ── shell ── */
.app{
  width:100%; max-width:500px; height:100dvh; margin:0 auto;
  display:flex; flex-direction:column; background:var(--bg);
  position:relative; overflow:hidden;
}
/* ── HEADER ── */
.header{
  position:relative; flex:0 0 auto;
  background:var(--panel);
  padding: calc(var(--st) + 14px) 16px 12px;
  text-align:center;
  min-height: calc(var(--st) + 110px);
  overflow:hidden;
}
/* зелёный угол как в макете */
.header .corner{
  position:absolute; right:0; top:0;
  width: clamp(72px, 22vw, 105px);
  height: clamp(72px, 22vw, 105px);
  background: linear-gradient(180deg, var(--g1) 0%, var(--g2) 100%);
  border-radius: 0 0 0 28px;
  z-index:0;
  pointer-events:none;
}
.cname{
  position:relative; z-index:1;
  color: var(--name);
  font-size: clamp(22px, 7vw, 32px);
  font-weight: 700;
  line-height:1.15;
  word-break:break-word;
  text-shadow: 0 1px 0 rgba(255,255,255,.12);
  margin-bottom: 10px;
}
.pills{
  position:relative; z-index:1;
  display:flex; flex-wrap:wrap; gap:6px;
  justify-content:center;
}
.pill{
  background: rgba(0,20,10,.45);
  border:1px solid rgba(0,255,115,.22);
  color: var(--text2);
  font-size: clamp(10px, 2.8vw, 12px);
  font-weight:600;
  padding: 5px 9px;
  border-radius: 999px;
  white-space:nowrap;
}
/* ── CONTENT ── */
.main{
  flex:1 1 auto;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding: 12px 12px 8px;
  display:flex; flex-direction:column; gap:10px;
  scrollbar-width:none;
}
.main::-webkit-scrollbar{display:none}
/* ── CARDS ── */
.card{
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px 14px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 14px rgba(0,0,0,.22);
}
.card.flat{ background: var(--panel2); }
.lbl{
  color: var(--muted);
  font-size: clamp(10px, 2.8vw, 12px);
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.val{
  color: var(--text) !important;
  font-size: clamp(15px, 4.4vw, 18px);
  font-weight: 700;
  line-height: 1.25;
  word-break: break-word;
}
.sub{
  color: var(--text2);
  font-size: clamp(11px, 3.2vw, 13px);
  margin-top: 3px;
  line-height: 1.35;
}
.sec{
  color: var(--g1);
  font-size: clamp(13px, 3.8vw, 15px);
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  margin: 4px 2px 0;
}
/* ── BUTTONS ── */
.btn{
  display:block; width:100%;
  background: var(--panel2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: clamp(13px, 3.6vw, 15px);
  font-weight: 700;
  text-align:center;
  cursor:pointer;
  font-family:inherit;
}
.btn:active{ transform: scale(.98); }
.btn.pri{
  background: linear-gradient(180deg, var(--g1), var(--g2));
  color: #00300f;
  border: none;
  box-shadow: 0 6px 16px rgba(0,255,115,.25);
}
.btn.dng{ background:#4a1515; border-color:#7a2a2a; color:#ffb0b0; }
.btn.sm{ padding:9px 11px; font-size:12.5px; }
.btn:disabled{ opacity:.4; }
.g2{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.g3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
/* ── BOTTOM NAV ── */
.nav{
  flex:0 0 auto;
  background: linear-gradient(180deg, var(--g1) 0%, var(--g2) 100%);
  padding: 10px 8px calc(10px + var(--sb));
  display:flex; gap:6px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  box-shadow: 0 -8px 24px rgba(0,0,0,.3);
}
.nav::-webkit-scrollbar{display:none}
.nb{
  flex:0 0 auto;
  background: rgba(0,39,18,.92);
  color: var(--g1);
  border: 1px solid rgba(0,0,0,.15);
  border-radius: 14px;
  padding: 9px 12px;
  font-size: clamp(10px, 2.7vw, 12px);
  font-weight: 700;
  white-space:nowrap;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  min-width: 64px;
}
.nb.act{
  background: #001a0c;
  color: var(--g1);
  box-shadow: 0 4px 12px rgba(0,0,0,.35);
}
.nb .ico{ font-size: 16px; line-height:1; }
/* ── PROGRESS ── */
.prog{ height:7px; background:rgba(0,0,0,.3); border-radius:99px; margin-top:7px; overflow:hidden; }
.pbar{ height:100%; background:linear-gradient(90deg,var(--g2),var(--g1)); border-radius:99px; }
/* ── TAGS ── */
.tag{ display:inline-block; padding:2px 7px; border-radius:6px; font-size:10px; font-weight:700; margin-right:4px; }
.tag.cpu{background:#1a3a5c;color:#8cf}
.tag.gpu{background:#3a1a5c;color:#c8f}
.tag.budget{background:#1a3a1a;color:#8f8}
.tag.mid{background:#3a3a1a;color:#ff8}
.tag.flagship{background:#3a1a1a;color:#f88}
/* ── FORM ── */
.inp, select{
  width:100%; padding:12px 14px;
  background:var(--input); border:1px solid var(--border);
  color:var(--text); border-radius:14px;
  font-size:15px; font-family:inherit; margin-bottom:8px;
}
/* ── MODAL ── */
.mdl{ position:fixed; inset:0; background:rgba(0,0,0,.82); display:none; align-items:center; justify-content:center; z-index:100; padding:14px; }
.mdl.act{ display:flex; }
.mdlc{
  background:var(--panel); border:1px solid var(--border);
  border-radius:20px; padding:16px; width:100%; max-width:400px;
  max-height:88dvh; overflow-y:auto;
}
.mdlt{ color:var(--g1); font-size:17px; font-weight:800; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.mdlt button{ background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; }
.row{ display:flex; justify-content:space-between; gap:10px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.06); font-size:13px; }
.row:last-child{ border:none; }
.row span:last-child{ color:var(--text); font-weight:700; text-align:right; }
.row span:first-child{ color:var(--muted); }
/* ── TOAST ── */
.toasts{ position:fixed; top:calc(var(--st) + 10px); left:0; right:0; z-index:200; display:flex; flex-direction:column; align-items:center; gap:6px; pointer-events:none; }
.toast{
  background:rgba(0,30,15,.95); color:var(--text);
  border:1px solid var(--border); border-radius:999px;
  padding:10px 16px; font-size:13px; font-weight:600;
  max-width:90%; text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  animation: pop .25s ease;
}
@keyframes pop{ from{opacity:0; transform:translateY(-8px)} to{opacity:1; transform:none} }
/* ── NEWS ── */
.news{ padding:9px 0; border-bottom:1px solid rgba(255,255,255,.06); }
.news:last-child{ border:none; }
/* ── DEV ── */
.dev{ position:fixed; bottom:0; left:0; right:0; background:#000; color:#0f0; font-family:monospace; font-size:11px; max-height:40dvh; z-index:300; display:none; flex-direction:column; border-top:2px solid #0f0; }
.dev.act{ display:flex; }
.dev-log{ flex:1; overflow-y:auto; padding:6px; max-height:30dvh; }
.dev-inp{ width:100%; background:#000; border:none; border-top:1px solid #0f0; color:#0f0; font-family:monospace; padding:8px; outline:none; }
.empty{ color:var(--muted); font-size:13px; padding:4px 0; }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="corner"></div>
    <div class="cname" id="ui-c">Silicon Forge</div>
    <div class="pills">
      <span class="pill" id="ui-d">📅 —</span>
      <span class="pill" id="ui-cap">💵 $0</span>
      <span class="pill" id="ui-t">🛡 50%</span>
      <span class="pill" id="ui-p">📣 0</span>
      <span class="pill" id="ui-day">День 0</span>
      <span class="pill" id="ui-drv">🖥 ×0.00</span>
    </div>
  </header>

  <main class="main" id="content"></main>

  <nav class="nav" id="nav"></nav>
</div>

<div class="mdl" id="mdl"><div class="mdlc" id="mdlc"></div></div>
<div class="toasts" id="toasts"></div>
<div class="dev" id="dev">
  <div class="dev-log" id="dev-log"></div>
  <input class="dev-inp" id="dev-inp" placeholder="Dev> help" autocomplete="off">
</div>

<script>
'use strict';
/* ════════════════════════════════════════════════
   ENGINE + ALL FEATURES (full offline port)
   UI rewritten to match your green mockup
════════════════════════════════════════════════ */
const VERSION="2.4.1";
let SEC_PER_DAY=2;
const GAME_START=new Date(1975,0,11);
const MONTHS=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
const RD_MULT=1.2, CHIP_LIFETIME=540, DRV_DECAY=30;
const PARAM_ORDER=["techproc","cores","freq","l1","l2","l3","ram_size","ram_freq","overclock","turbo","socket"];
const TIERS={budget:{n:"💸 Бюджет",pm:.85,mp:1.12,dm:1.22},mid:{n:"⚖️ Средний",pm:1,mp:1,dm:1.38},flagship:{n:"👑 Флагман",pm:1.28,mp:.93,dm:1.75}};
const PARAMS={
  techproc:{n:"🔬 Техпроцесс",u:"нм",bc:25000,cm:1.18,bd:60,da:22,mn:1},
  cores:{n:"🧩 Ядра",u:"шт",bc:18000,cm:1.22,bd:45,da:18,mn:1},
  freq:{n:"⚡ Частота",u:"МГц",bc:16000,cm:1.16,bd:40,da:16,mn:1},
  l1:{n:"💾 L1",u:"КБ",bc:12000,cm:1.15,bd:35,da:14,mn:8},
  l2:{n:"💽 L2",u:"КБ",bc:15000,cm:1.15,bd:45,da:16,mn:64},
  l3:{n:"🗄 L3",u:"МБ",bc:22000,cm:1.17,bd:55,da:18,mn:1},
  ram_size:{n:"🧠 ОЗУ",u:"ГБ",bc:15000,cm:1.16,bd:40,da:15,mn:1},
  ram_freq:{n:"📶 Частота ОЗУ",u:"МГц",bc:14000,cm:1.15,bd:40,da:14,mn:400},
  overclock:{n:"🔥 Разгон",u:"%",bc:18000,cm:1.15,bd:50,da:16,mn:0},
  turbo:{n:"🚀 Турбо",u:"%",bc:20000,cm:1.15,bd:55,da:17,mn:0},
  socket:{n:"🔌 Сокет",u:"пин",bc:20000,cm:1.14,bd:50,da:15,mn:8}
};
const TECHS={
  qc:{n:"🔍 Качество",c:15000,d:80,desc:"Брак −40%",req:null},
  auto:{n:"🤖 Автоматизация",c:50000,d:140,desc:"Себестоимость −20%",req:null},
  marketing_tech:{n:"📢 Маркетинг",c:25000,d:100,desc:"+50% привлекательность",req:null},
  advanced_rd:{n:"🧠 Продв. R&D",c:90000,d:180,desc:"R&D −30%",req:"qc"},
  logistics:{n:"🚚 Логистика",c:35000,d:100,desc:"Штрафы −50%",req:null},
  hr_school:{n:"🎓 Университет",c:40000,d:120,desc:"Обучение −30%",req:null},
  driver_sdk:{n:"🖥 SDK",c:30000,d:90,desc:"Драйверы −30%",req:null}
};
const RAM_TYPES={
  DRAM:{n:"DRAM",d:0,m:1},FPM:{n:"FPM",d:4380,m:1.1},EDO:{n:"EDO",d:7300,m:1.2},
  SDRAM:{n:"SDRAM",d:8030,m:1.35},DDR:{n:"DDR",d:9125,m:1.55},DDR2:{n:"DDR2",d:10220,m:1.8},
  DDR3:{n:"DDR3",d:11680,m:2.1},DDR4:{n:"DDR4",d:14235,m:2.5},DDR5:{n:"DDR5",d:16425,m:3}
};
const CORPS=["MSI","Gigabyte","ASUS","Apple","Dell","Sony","HP","Lenovo","Acer","Nvidia"];
const DONATE_PACKS={
  stars_50:{stars:50,title:"📦 Стартёр",desc:"+$80k",capital:80000,trust:2,drivers:0,ads:0},
  stars_100:{stars:100,title:"💼 Бизнес",desc:"+$200k",capital:200000,trust:5,drivers:0,ads:0},
  stars_250:{stars:250,title:"🏭 Корпорация",desc:"+$600k +drv",capital:600000,trust:10,drivers:20,ads:0},
  stars_500:{stars:500,title:"👑 Магнат",desc:"+$1.5M +ads",capital:1500000,trust:15,drivers:40,ads:300},
  stars_1000:{stars:1000,title:"🌟 Империя",desc:"+$4M",capital:4000000,trust:25,drivers:100,ads:600}
};
const AI_NAMES=["Zenith","Nexus","Volt","Quantum","Titan","Fusion","Apex","Vertex","Prism","Orion"];
const WK_NAMES=["Алекс","Мария","Джон","Ли","Олег","Сара","Кен","Анна","Дмитрий","Эмма","Виктор","София"];
const NAV=[
  ["menu","🏠","Меню"],["chips","📦","Чипы"],["create","🚀","Создать"],["rd","🔬","R&D"],
  ["workers","👥","Рабочие"],["drivers","🖥","Драйверы"],["shares","📊","Акции"],
  ["contracts","📜","Контракты"],["market","🛒","Рынок"],["buyout","🏪","Купить"],
  ["rank","🌍","Рейтинг"],["top","🏆","Топ"],["news_c","🏢","Новости"],["news_g","🎮","Игра"],
  ["msg","📩","Сообщ."],["donate","⭐","Донат"],["help","📖","Справка"],["settings","⚙️","Ещё"]
];

const NEW=()=>({
  version:VERSION, day:0,
  player:{company:"Silicon Forge", capital:100000, trust:50, popularity:0,
    total_shares:10000, shares_market:5000, share_price:10,
    driver_win:0, driver_lin:0, driver_mac:0, driver_day:0,
    is_frozen:false, is_banned:false, ban_reason:"", created_day:0, stars_spent:0},
  workers:[], free_workers:[], chips:[], research_completed:[], research_active:[],
  contracts:[], news:[], donations:[], share_ownership:{}, ai_companies:[],
  next_chip_id:1, next_contract_id:1, next_worker_id:1, next_research_id:1, last_tick:Date.now()
});
let state=NEW();
const KEY="tycoon_v241_ui2";
function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}
function load(){try{const s=localStorage.getItem(KEY);if(!s)return false;state=Object.assign(NEW(),JSON.parse(s));return true}catch(e){return false}}

/* ── utils ── */
const $=id=>document.getElementById(id);
function safe(t){return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function fmt$(n){return "$"+Math.round(+n||0).toLocaleString("en-US")}
function fmtDate(d=state.day){const dt=new Date(GAME_START.getTime()+d*86400000);return `${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`}
function ramAvail(d=state.day){return Object.keys(RAM_TYPES).filter(k=>d>=RAM_TYPES[k].d)}
function ramMult(rt){return (RAM_TYPES[rt]||{m:1}).m}
function trustBar(t){const g=Math.round(t/100*6);return "🟢".repeat(g)+"🔴".repeat(6-g)}
function trustLbl(t){for(const[k,l]of[[90,"Лидер"],[70,"Высокое"],[50,"Среднее"],[30,"Низкое"],[10,"Плохое"]])if(t>=k)return l;return "Критическое"}
function trustMod(t){return .1+(t/100)*1.9}
function popMod(p){return 1+Math.min(1.5,(p||0)/200)}
function companyVal(p=state.player){return p.capital+(p.total_shares-p.shares_market)*p.share_price}
function drvMult(p=state.player){return (p.driver_win*.7+p.driver_mac*.2+p.driver_lin*.1)/100}
function addTrust(d){const a=d>0?d*.3:d*2;state.player.trust=Math.max(.1,Math.min(99.9,state.player.trust+a))}
function addNews(title,content,type="company"){state.news.unshift({id:Date.now()+Math.random(),title,content,type,day:state.day});if(state.news.length>80)state.news.length=80}
function rLvl(pk){return state.research_completed.filter(r=>r.tech_key==="param_"+pk).length}
function hasTech(k){return state.research_completed.some(r=>r.tech_key===k)}
function hasActive(k){return state.research_active.some(r=>r.tech_key===k)}
function techs(){return new Set(state.research_completed.map(r=>r.tech_key))}
function toast(m,d=2400){const t=document.createElement("div");t.className="toast";t.innerHTML=m;$("toasts").appendChild(t);setTimeout(()=>t.remove(),d)}
function modal(html){$("mdlc").innerHTML=html;$("mdl").classList.add("act")}
function closeModal(){$("mdl").classList.remove("act")}
function devlog(m){const el=$("dev-log");if(!el)return;const d=document.createElement("div");d.textContent=`[${new Date().toLocaleTimeString()}] ${m}`;el.appendChild(d);el.scrollTop=el.scrollHeight}

/* ── formulas ── */
function perf(c,rt="DRAM"){try{const tp=Math.max(1,c.techproc);return ((Math.max(1,c.cores)**0.55)*(Math.max(1,c.freq)**1.15)*(1+c.l1/64)*(1+c.l2/512)*(1+c.l3/8)*(1+(c.ram_size*Math.max(1,c.ram_freq)/32768))*(1+(c.overclock+c.turbo)/120)*(1+c.socket/800))/(tp**0.5)*ramMult(rt)}catch(e){return 0}}
function prodCost(c,rt="DRAM"){const tp=Math.max(1,c.techproc);return Math.round((35+c.cores*55+Math.max(0,(12000/tp)-1)*8+c.freq*.08+c.l1*.5+c.l2*.3+c.l3*25+c.ram_size*500+c.ram_freq*.04+c.overclock*30+c.turbo*35+c.socket*1.2)*(.7+.3*ramMult(rt))*100)/100}
function pCost(pk,l){return Math.floor(PARAMS[pk].bc*(PARAMS[pk].cm**l))}
function pDays(pk,l){return Math.floor((PARAMS[pk].bd+l*PARAMS[pk].da)*RD_MULT)}
function maxValAt(pk,lvl){lvl=Math.max(0,lvl|0);let v;
  if(pk==="techproc"){v=10000;for(let i=0;i<lvl;i++)v=Math.max(1,Math.min(v*.7,v-Math.max(1,v*.05)));return Math.max(1,Math.round(v))}
  if(pk==="cores"){v=1;for(let i=0;i<lvl;i++)v+=(v<6?1:v<16?2:v<32?4:v<64?8:16);return Math.min(v,256)}
  if(pk==="freq"){v=1;for(let i=0;i<lvl;i++)v=Math.max(v+1,v*1.85);return Math.min(Math.round(v),100000)}
  if(pk==="l1"){v=8;for(let i=0;i<lvl;i++)v+=(v<32?8:v<128?16:32);return Math.min(v,2048)}
  if(pk==="l2"){v=64;for(let i=0;i<lvl;i++)v+=(v<512?64:v<2048?128:256);return Math.min(v,65536)}
  if(pk==="l3"){v=1;for(let i=0;i<lvl;i++)v+=(v<4?1:v<16?2:4);return Math.min(v,256)}
  if(pk==="ram_size"){v=1;for(let i=0;i<lvl;i++)v+=(v<8?1:v<32?2:8);return Math.min(v,512)}
  if(pk==="ram_freq"){v=400;for(let i=0;i<lvl;i++)v=Math.max(v+100,v*1.25);return Math.min(Math.round(v),10000)}
  if(pk==="overclock"||pk==="turbo")return Math.min(lvl*5,100);
  if(pk==="socket"){v=8;for(let i=0;i<lvl;i++)v+=(v<64?8:v<128?16:24);return Math.min(v,4096)}
  return PARAMS[pk]?.mn||1}
function coresCap(tp){return Math.max(1,Math.min(256,Math.round(18000/(Math.max(1,tp)**0.85))))}
function freqCap(tp){return Math.max(1,Math.min(100000,Math.round(120000/(Math.max(1,tp)**0.95))))}
function maxVal(pk,lc){let lvl,tpl,sl;
  if(lc){lvl=lc[pk]||0;tpl=lc.techproc||0;sl=lc.socket||0}
  else{lvl=rLvl(pk);tpl=pk!=="techproc"?rLvl("techproc"):lvl;sl=pk!=="socket"?rLvl("socket"):lvl}
  let v=maxValAt(pk,lvl);const tp=maxValAt("techproc",tpl);
  if(pk==="cores")v=Math.min(v,coresCap(tp),Math.max(1,Math.floor(maxValAt("socket",sl)/4)));
  else if(pk==="freq")v=Math.min(v,freqCap(tp));
  else if(pk==="l3")v=Math.min(v,Math.max(1,Math.floor(coresCap(tp)/2)));
  else if(pk==="overclock"){if(tp>=3000)v=Math.min(v,15);else if(tp>=1000)v=Math.min(v,35);else if(tp>=100)v=Math.min(v,60)}
  else if(pk==="turbo"){if(tp>=3000)v=Math.min(v,10);else if(tp>=1000)v=Math.min(v,30);else if(tp>=100)v=Math.min(v,55)}
  return Math.max(PARAMS[pk].mn,Math.floor(v))}
function nextVal(pk){const l={};PARAM_ORDER.forEach(p=>l[p]=rLvl(p));l[pk]=(l[pk]||0)+1;return maxVal(pk,l)}
function techName(k){if(TECHS[k])return TECHS[k].n;if(k.startsWith("param_"))return (PARAMS[k.slice(6)]||{n:k}).n;return k}
function mktBoost(t){t=Math.max(0,t|0);return t<=0?1:Math.min(3,1.5+t/100)}
function wEff(){const w=state.workers;if(!w.length)return 0;return (w.reduce((a,x)=>a+x.skill,0)/5)*Math.min(1,w.length/5)}
function wTxt(){const w=state.workers;if(!w.length)return "🚫 Нет сотрудников";const c=w.length;const m={1:"0.20x",2:"0.40x",3:"0.60x",4:"0.80x"}[c]||"1.00x";return `👥${c} 🎓${(w.reduce((a,x)=>a+x.skill,0)/c).toFixed(1)} ❤️${Math.round(w.reduce((a,x)=>a+x.loyalty,0)/c)}% ${m}`}
function chkMistake(){const n=state.workers.length,e=wEff(),T=techs();
  if(!n)return[true,(Math.random()*1700+800)*(T.has("logistics")?.5:1)];
  const sk=state.workers.reduce((a,w)=>a+w.skill,0)/n,lo=state.workers.reduce((a,w)=>a+w.loyalty,0)/n;
  let ch=Math.max(5,35-sk*6*e-lo*.25*e);if(T.has("qc"))ch*=.6;
  if(Math.random()*100<ch)return[true,Math.round((Math.random()*2900+600)*(1.2/Math.max(1,sk*e))*(T.has("logistics")?.5:1)*100)/100];

let prevRam=new Set();
function tick(cd){
  const p=state.player,notif=[];
  if(p.is_frozen||p.is_banned)return notif;
  if(cd-(p.driver_day||0)>=DRV_DECAY){p.driver_win=Math.max(0,p.driver_win-5);p.driver_lin=Math.max(0,p.driver_lin-5);p.driver_mac=Math.max(0,p.driver_mac-5);p.driver_day=cd}
  const done=state.research_active.filter(r=>r.finish_day<=cd);
  for(const r of done){state.research_completed.push({id:r.id,tech_key:r.tech_key,finish_day:cd});let d="";if(r.tech_key.startsWith("param_"))d=`→ ${maxVal(r.tech_key.slice(6)).toLocaleString()}`;notif.push(`🔬 ${techName(r.tech_key)} ${d}`);addNews(`🔬 ${techName(r.tech_key)}`,`Завершено ${d}`,"company")}
  state.research_active=state.research_active.filter(r=>r.finish_day>cd);
  // sales
  const sale=state.chips.filter(c=>c.for_sale&&c.sell_price>0&&!c.contract_id);
  if(sale.length){
    const T=techs(),tmu=Math.max(2,(state.ai_companies.length+1)*(Math.random()*2+.8));
    const tm=trustMod(p.trust),pm=popMod(p.popularity),drv=drvMult(p);
    for(const tn of ["budget","mid","flagship"]){
      const tc=sale.filter(c=>c.chip_tier===tn);if(!tc.length)continue;
      const ttmu=tmu*({budget:60,mid:30,flagship:10}[tn]/100)*5;
      const cvs=tc.map(c=>{const pr=Math.max(1,c.sell_price);let vs=(perf(c,c.ram_type)/pr)*TIERS[tn].mp;const age=Math.max(0,cd-(c.created_day||0));vs*=Math.max(0,1-age/CHIP_LIFETIME)*tm*(.1+drv*.9)*pm*(T.has("marketing_tech")?1.5:1)*(1+Math.min(1,(c.marketing_ticks||0)/200));if(p.capital>50e6)vs*=.6;else if(p.capital>10e6)vs*=.8;return{c,value:Math.max(vs,1e-4),mkt:c.marketing_ticks||0,price:pr,cost:c.cost}});
      const tv=cvs.reduce((a,x)=>a+x.value,0)||1;
      for(const v of cvs){let u=Math.floor(ttmu*(v.value/tv)*mktBoost(v.mkt));if(v.mkt>0&&u<2)u=2+(v.mkt/50|0);if(u<=0){if(v.mkt>0)v.c.marketing_ticks=Math.max(0,v.mkt-1);continue}const rev=Math.round(u*Math.max(0,v.price-v.cost)*100)/100;v.c.lifetime_profit=(v.c.lifetime_profit||0)+rev;v.c.sales_total=(v.c.sales_total||0)+u;v.c.marketing_ticks=Math.max(0,v.mkt-1);if(rev>0){p.capital+=rev;p.trust=Math.min(99.9,p.trust+.3);if(v.mkt>0)p.popularity=Math.min(500,p.popularity+.15)}}
    }
  }
  if(cd>0&&cd%7===0&&p.popularity>0)p.popularity=Math.max(0,p.popularity-1);
  const np=p.capital>0?p.share_price*.85+(Math.max(.1,p.capital/10000)*Math.max(.2,1-(p.shares_market/Math.max(1,p.total_shares))*.35))*.15:.01;
  p.share_price=Math.max(.01,Math.round(np*100)/100);
  for(const ai of state.ai_companies){ai.capital+=ai.capital*.001*(Math.random()-.3);ai.share_price=Math.max(.5,ai.share_price*(.98+Math.random()*.04));if(Math.random()<.15&&ai.chips.length<4)ai.chips.push(genAIChip(ai));ai.chips=ai.chips.filter(c=>cd-c.created_day<300)}
  if(cd>0&&cd%5===0){const pc=state.contracts.filter(c=>c.sender_id===0&&c.status==="PENDING").length;for(let i=0;i<Math.max(0,3-pc);i++){const ct=Math.random()>.5?"CPU":"GPU",amt=3+Math.random()*13|0,rw=amt*(5000+Math.random()*15000|0);state.contracts.push({id:state.next_contract_id++,sender_id:0,receiver_id:"self",template_key:`deliver_${ct.toLowerCase()}`,chip_type:ct,amount:amt,reward:rw,penalty:Math.floor(rw*.5),duration:30+Math.random()*91|0,started_day:cd,finish_day:cd+(30+Math.random()*91|0),delivered:0,status:"PENDING",extra_text:CORPS[Math.random()*CORPS.length|0]})}}
  for(const c of state.contracts){if(c.status!=="ACTIVE"||!["deliver_cpu","deliver_gpu"].includes(c.template_key))continue;const need=c.template_key==="deliver_cpu"?"CPU":"GPU",left=c.amount-c.delivered;if(left<=0)continue;const take=state.chips.filter(ch=>ch.chip_type===need&&!ch.contract_id&&!ch.for_sale).slice(0,left);for(const ch of take)state.chips=state.chips.filter(x=>x.chip_id!==ch.chip_id);c.delivered+=take.length;if(take.length)notif.push(`📦 #${c.id} ${c.delivered}/${c.amount}`);if(c.delivered>=c.amount){c.status="COMPLETED";p.capital+=c.reward*2;addTrust(3);notif.push(`✅ #${c.id} +${fmt$(c.reward*2)}`);addNews(`✅ Контракт #${c.id}`,`+${fmt$(c.reward*2)}`,"company")}}
  for(const c of state.contracts){if(c.status!=="ACTIVE"||!["deliver_cpu","deliver_gpu"].includes(c.template_key))continue;if(cd>=c.finish_day&&c.delivered<c.amount){c.status="FAILED";let pen=c.penalty;if(techs().has("logistics"))pen*=.5;p.capital-=pen;addTrust(-5);notif.push(`❌ #${c.id} −${fmt$(pen)}`)}}
  if(cd>0&&cd%30===0&&p.capital>0){const pay=state.workers.reduce((a,w)=>a+w.salary,0);let wt=0;if(p.capital>50e6)wt=p.capital*.12;else if(p.capital>10e6)wt=p.capital*.08;else if(p.capital>2e6)wt=p.capital*.04;else if(p.capital>5e5)wt=p.capital*.015;const tot=Math.round((pay*.2+wt)*100)/100;if(tot>0){p.capital=Math.max(0,p.capital-tot);notif.push(`🏛 −${fmt$(tot)}`)}}
  if(state.free_workers.length<5)seedWorkers();
  const now=new Set(ramAvail(cd));if(prevRam.size){for(const rt of [...now].filter(x=>!prevRam.has(x))){addNews(`🧠 ${RAM_TYPES[rt].n}`,`×${RAM_TYPES[rt].m.toFixed(2)}`,"game");notif.push(`🎮 ${RAM_TYPES[rt].n}`)}}prevRam=now;
  save();return notif;
}

function ccFinish(){
  const fc={};for(const pk of PARAM_ORDER){let v=CC.params[pk]??PARAMS[pk].mn;if(pk==="techproc")v=Math.max(maxVal(pk),Math.min(10000,v));else v=Math.max(PARAMS[pk].mn,Math.min(maxVal(pk),v));fc[pk]=v}
  const[bad,pen]=chkMistake();
  if(bad){addTrust(-3);state.player.capital=Math.max(0,state.player.capital-pen);save();toast(`⚠️ Брак −${fmt$(pen)}`);CC=null;nav("menu");return}
  let cost=prodCost(fc,CC.ram_type);if(techs().has("auto"))cost=Math.round(cost*.8*100)/100;cost=Math.round(cost*TIERS[CC.tier].pm*100)/100;
  const sp=Math.max(cost*TIERS[CC.tier].dm,cost+5);
  if(state.player.capital<cost){toast(`❌ ${fmt$(cost)}`);return}
  state.player.capital-=cost;
  state.chips.push({chip_id:state.next_chip_id++,chip_type:CC.type,chip_name:CC.name,chip_tier:CC.tier,cost,...fc,ram_type:CC.ram_type,for_sale:0,sell_price:Math.round(sp*100)/100,marketing_ticks:0,lifetime_profit:0,sales_total:0,contract_id:0,created_day:state.day});

  const tp=maxVal("techproc");
  html+=`<div class="card"><div class="lbl">Капы</div><div class="val">${tp}нм · 🧩≤${coresCap(tp)} · ⚡≤${freqCap(tp)}</div></div>`;
  html+=`<div class="sec">Параметры</div>`;
  for(const pk of PARAM_ORDER){
    const lvl=rLvl(pk),cur=maxVal(pk),nxt=nextVal(pk),cost=pCost(pk,lvl);
    let days=pDays(pk,lvl);if(techs().has("advanced_rd"))days=Math.max(1,days*.7|0);days=Math.max(1,days*(1+act.length*.5)|0);
    const busy=hasActive("param_"+pk),capped=(pk!=="techproc"&&nxt<=cur)||(pk==="techproc"&&nxt>=cur);
    html+=`<div class="card"><div class="lbl">${PARAMS[pk].n} · ур.${lvl}</div><div class="val">${cur.toLocaleString()} → ${nxt.toLocaleString()} ${PARAMS[pk].u}</div>
    ${busy?`<div class="sub">⏳ уже идёт</div>`:capped?`<div class="sub">🔒 кап</div>`:`<button class="btn sm" ${act.length>=2?"disabled":""} onclick="startRes('param_${pk}',${cost},${days})">▶️ ${fmt$(cost)} · ${days}д</button>`}</div>`;
  }
  html+=`<div class="sec">Технологии</div>`;
  const C=techs();
  for(const[k,t]of Object.entries(TECHS)){
    if(C.has(k)){html+=`<div class="card"><div class="lbl">✅ ${t.n}</div><div class="sub">${t.desc}</div></div>`;continue}
    if(t.req&&!C.has(t.req)){html+=`<div class="card"><div class="lbl">🔒 ${t.n}</div><div class="sub">Нужно: ${TECHS[t.req].n}</div></div>`;continue}
    if(hasActive(k)){html+=`<div class="card"><div class="lbl">⏳ ${t.n}</div><div class="sub">${t.desc}</div></div>`;continue}
    let days=Math.floor(t.d*RD_MULT);if(C.has("advanced_rd")&&k!=="advanced_rd")days=Math.max(1,days*.7|0);days=Math.max(1,days*(1+act.length*.5)|0);
    html+=`<div class="card"><div class="lbl">📖 ${t.n}</div><div class="sub">${t.desc}</div><button class="btn sm" ${act.length>=2?"disabled":""} onclick="startRes('${k}',${t.c},${days})">▶️ ${fmt$(t.c)} · ${days}д</button></div>`;
  }
  h(html);
}
function startRes(key,cost,days){
  if(state.research_active.length>=2)return toast("Макс 2");
  if(hasActive(key))return toast("Уже");
  if(state.player.capital<cost)return toast(`❌ ${fmt$(cost)}`);
  if(key.startsWith("param_")){const pk=key.slice(6),cur=maxVal(pk),nxt=nextVal(pk);if(pk!=="techproc"&&nxt<=cur)return toast("Сначала техпроцесс");if(pk==="techproc"&&nxt>=cur)return toast("Кап")}
  else{if(techs().has(key))return toast("Уже");const t=TECHS[key];if(t.req&&!techs().has(t.req))return toast("Нужна предыдущая")}
  state.player.capital-=cost;state.research_active.push({id:state.next_research_id++,tech_key:key,started_day:state.day,finish_day:state.day+days});save();toast(`✅ ${days}д`);render();
}

  let html=`<div class="sec">📩 Входящие (${inbox.length})</div>`;
  if(!inbox.length)html+=`<div class="card"><div class="empty">Нет сообщений</div></div>`;
  else inbox.forEach(c=>html+=`<div class="card"><div class="lbl">📨 ${safe(c.extra_text)} #${c.id}</div><div class="val">${c.chip_type}×${c.amount}</div><div class="sub">💰 ${fmt$(c.reward)} · ❌ ${fmt$(c.penalty)} · ${c.duration}д</div><div class="g2" style="margin-top:8px"><button class="btn sm pri" onclick="accC(${c.id})">✅</button><button class="btn sm dng" onclick="rejC(${c.id})">❌</button></div></div>`);
  h(html);
}
function sDonate(){
  let html=`<div class="card"><div class="lbl">⭐ Донат (офлайн-демо)</div><div class="val">Потрачено: ${state.player.stars_spent}</div><div class="sub">Пакеты активируются бесплатно</div></div>`;
  Object.entries(DONATE_PACKS).forEach(([k,p])=>html+=`<div class="card"><div class="lbl">${p.title} · ⭐${p.stars}</div><div class="val">${p.desc}</div><div class="sub">+${fmt$(p.capital)} · 🛡+${p.trust} · 🖥+${p.drivers} · 📢+${p.ads}</div><button class="btn sm pri" style="margin-top:8px" onclick="claim('${k}')">Получить</button></div>`);
  h(html);
}
function claim(k){const p=DONATE_PACKS[k];if(!p)return;const me=state.player;me.capital+=p.capital;me.stars_spent+=p.stars;me.popularity=Math.min(500,me.popularity+p.trust*3+p.stars/10);if(p.trust)me.trust=Math.min(99.9,me.trust+p.trust);if(p.drivers){me.driver_win=Math.min(100,me.driver_win+p.drivers);me.driver_lin=Math.min(100,me.driver_lin+p.drivers);me.driver_mac=Math.min(100,me.driver_mac+p.drivers)}if(p.ads)state.chips.filter(c=>c.for_sale).forEach(c=>c.marketing_ticks=(c.marketing_ticks||0)+p.ads);save();toast(`🎉 ${p.title}`);render()}
function sHelp(){h(`<div class="card"><div class="val">📖 v${VERSION}</div></div>
<div class="card"><div class="lbl">Старт</div><div class="sub">1) Найми рабочих 2) R&D техпроцесс 3) Создай чип 4) Выставь на продажу 5) Драйверы</div></div>
<div class="card"><div class="lbl">R&D</div><div class="sub">Сначала снижай нм — откроются капы ядер/частоты. Параллельные исследования +50% к сроку.</div></div>
<div class="card"><div class="lbl">Продажи</div><div class="sub">perf/цена · тир · доверие · популярность · драйверы · возраст · маркетинг</div></div>
<div class="card"><div class="lbl">Налоги</div><div class="sub">Каждые 30 дней: 20% от ЗП + налог 0–12%</div></div>
<div class="card"><div class="lbl">Dev</div><div class="sub">Настройки → Dev-консоль</div></div>`)}
function sSettings(){
  const p=state.player;
  h(`<div class="card"><div class="lbl">Компания</div><div class="val">${safe(p.company)}</div></div>
  <button class="btn" onclick="rename()">✏️ Переименовать</button>
  <button class="btn" onclick="toggleFreeze()">${p.is_frozen?"🔥 Разморозить":"❄️ Заморозить"}</button>
  <button class="btn" onclick="exportSave()">💾 Экспорт</button>
  <button class="btn" onclick="importSave()">📂 Импорт</button>
  <button class="btn" onclick="$('dev').classList.toggle('act')">💻 Dev-консоль</button>
  <button class="btn dng" onclick="if(confirm('Сброс?')){localStorage.removeItem(KEY);location.reload()}">🗑 Сброс</button>
  <div class="card"><div class="sub">День ${state.day} · ${SEC_PER_DAY}с/день · AI ${state.ai_companies.length} · Чипы ${state.chips.length}</div></div>`)}
function rename(){const v=prompt("Название",state.player.company);if(v==null)return;const n=v.trim().slice(0,35);if(!n)return;state.player.company=n;save();toast("✅");render()}
function toggleFreeze(){state.player.is_frozen=!state.player.is_frozen;save();toast(state.player.is_frozen?"❄️":"🔥");render()}
function exportSave(){const b=new Blob([JSON.stringify(state)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`tycoon_${Date.now()}.json`;a.click();URL.revokeObjectURL(u);toast("💾")}
function importSave(){const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{state=Object.assign(NEW(),JSON.parse(ev.target.result));save();toast("✅");render()}catch(err){toast("❌")}};r.readAsText(f)};i.click()}

/* dev */
function devExec(cmd){const p=cmd.trim().split(/\s+/),c=(p[0]||"").toLowerCase();
  try{
    if(c==="help")devlog("give N | day N | speed N | driver N | pop N | trust N | gamenews T;C | reset | stats | freeze");
    else if(c==="stats")devlog(`d${state.day} ${fmt$(state.player.capital)} t${state.player.trust.toFixed(1)} chips${state.chips.length}`);
    else if(c==="give"){state.player.capital+=+p[1]||0;save();header();devlog("✅")}
    else if(c==="day"){state.day+=+p[1]||0;save();header();render();devlog("✅")}
    else if(c==="speed"){SEC_PER_DAY=+p[1]||2;devlog("speed="+SEC_PER_DAY)}
    else if(c==="driver"){const v=+p[1]||0;state.player.driver_win=state.player.driver_lin=state.player.driver_mac=Math.max(0,Math.min(100,v));save();header();devlog("✅")}
    else if(c==="pop"){state.player.popularity=Math.max(0,Math.min(500,+p[1]||0));save();header();devlog("✅")}
    else if(c==="trust"){state.player.trust=Math.max(.1,Math.min(99.9,+p[1]||50));save();header();devlog("✅")}
    else if(c==="gamenews"){const t=cmd.slice(8);const [a,b]=t.split(";");addNews((a||"").trim(),(b||"").trim(),"game");save();devlog("✅")}
    else if(c==="freeze")toggleFreeze();
    else if(c==="reset"){localStorage.removeItem(KEY);location.reload()}
    else devlog("? help");
  }catch(e){devlog("err "+e)}
}

/* init */
function init(){
  if(!load()){seedWorkers();seedAI();addNews("🌟 Старт",`Processor Tycoon v${VERSION}`,"game");save()}
  prevRam=new Set(ramAvail());
  paintNav();header();render();
  setInterval(()=>{
    if(state.player.is_frozen||state.player.is_banned)return;
    if(Date.now()-state.last_tick>=SEC_PER_DAY*1000){
      state.last_tick=Date.now();state.day++;
      tick(state.day).forEach(n=>toast(n,3200));
      header();render();
    }
  },400);
  $("dev-inp").addEventListener("keydown",e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(!v)return;devlog("> "+v);devExec(v);e.target.value=""}});
  $("mdl").addEventListener("click",e=>{if(e.target.id==="mdl")closeModal()});
}
document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
