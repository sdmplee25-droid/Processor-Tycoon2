<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Processor Tycoon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Убираем синее выделение при клике на айфонах и фиксим высоту */
        * { -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Noto Sans', sans-serif; 
            background-color: #101010; 
            color: white;
            overflow: hidden; /* Запрещаем скролл всей страницы */
        }
        /* 100dvh - это динамическая высота, спасает от обрезки на iOS */
        #app { height: 100dvh; width: 100vw; display: flex; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- Главный контейнер приложения -->
    <div id="app"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        // Определяем устройство (tdesktop, web, macos - это компы)
        const isDesktop = ['tdesktop', 'web', 'macos'].includes(tg.platform);

        const appDiv = document.getElementById('app');

        // Данные игры (пока заглушки, потом будем брать из Python)
        const pagesData = {
            "Статистика": "🏢 Капитал: $100,000\n📈 Акции: $10.00\n🛡 Доверие: 50.0",
            "Производство": "📦 Ваши чипы. Нажмите, чтобы создать новый CPU или GPU.",
            "Исследования": "🔬 Текущий техпроцесс: 10000нм. Доступны новые технологии.",
            "Контракты": "📜 Текущих контрактов нет. Ожидайте предложений от корпораций.",
            "Рабочие": "👥 У вас 0 рабочих. Нанять новых?",
            "Рынок": "🛒 Акции других компаний и рынок процессоров.",
            "Новости": "📰 Нет новых сообщений."
        };

        const menuItems = Object.keys(pagesData);

        // --- ЛОГИКА ОТРИСОВКИ ---

        function renderApp() {
            appDiv.innerHTML = ''; // Очищаем экран
            tg.BackButton.hide();  // Прячем кнопку назад (мы в главном меню)

            if (isDesktop) {
                renderDesktop();
            } else {
                renderMobileMenu();
            }
        }

        // 1. ИНТЕРФЕЙС ДЛЯ ТЕЛЕФОНА (Вертикальный список)
        function renderMobileMenu() {
            const container = document.createElement('div');
            container.className = "w-full h-full overflow-y-auto no-scrollbar flex flex-col gap-1 p-2 pb-8";

            menuItems.forEach(title => {
                const btn = document.createElement('div');
                // min-h-[80px] гарантирует, что кнопка не будет слишком огромной на маленьком экране
                btn.className = "w-full min-h-[85px] bg-[#00FF99] rounded-xl flex items-center justify-center text-black text-2xl font-bold cursor-pointer transition-all active:scale-[0.98] active:opacity-80 shadow-lg";
                btn.innerText = title;
                
                btn.onclick = () => openMobilePage(title);
                container.appendChild(btn);
            });

            appDiv.appendChild(container);
        }

        // Открытие страницы на телефоне
        function openMobilePage(title) {
            appDiv.innerHTML = ''; // Очищаем экран
            tg.BackButton.show();  // ПОКАЗЫВАЕМ кнопку "Назад" в шапке Телеграма

            const page = document.createElement('div');
            page.className = "w-full h-full flex flex-col p-6 bg-[#181818]";
            
            page.innerHTML = `
                <h1 class="text-3xl font-bold text-[#00FF99] mb-6">${title}</h1>
                <div class="text-lg text-gray-300 whitespace-pre-wrap">${pagesData[title]}</div>
            `;
            
            appDiv.appendChild(page);
        }

        // 2. ИНТЕРФЕЙС ДЛЯ ПК (Боковое меню + Контент справа)
        function renderDesktop() {
            // Боковая панель
            const sidebar = document.createElement('div');
            sidebar.className = "w-[300px] h-full bg-[#101010] border-r border-[#333] flex flex-col overflow-y-auto no-scrollbar p-4 gap-2";

            // Область контента
            const contentArea = document.createElement('div');
            contentArea.id = "desktop-content";
            contentArea.className = "flex-1 h-full bg-[#181818] p-10";
            contentArea.innerHTML = `<h1 class="text-4xl font-bold text-gray-500 text-center mt-20">Выберите раздел в меню слева</h1>`;

            menuItems.forEach(title => {
                const btn = document.createElement('div');
                btn.className = "w-full py-4 px-6 bg-transparent hover:bg-[#00FF99] hover:text-black text-[#00FF99] rounded-lg text-xl font-bold cursor-pointer transition-colors border border-[#00FF99]";
                btn.innerText = title;
                
                btn.onclick = () => {
                    const area = document.getElementById("desktop-content");
                    area.innerHTML = `
                        <h1 class="text-5xl font-bold text-[#00FF99] mb-8">${title}</h1>
                        <div class="text-2xl text-gray-300 whitespace-pre-wrap">${pagesData[title]}</div>
                    `;
                };
                sidebar.appendChild(btn);
            });

            appDiv.appendChild(sidebar);
            appDiv.appendChild(contentArea);
        }

        // --- ОБРАБОТЧИК КНОПКИ "НАЗАД" НА ТЕЛЕФОНЕ ---
        tg.BackButton.onClick(() => {
            renderApp(); // Возвращаемся в главное меню
        });

        // ЗАПУСК
        renderApp();
    </script>
</body>
</html>
